server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Aggressive cache for hashed static assets (JS/CSS bundles get content-hash names from Vite)
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any route not matching a real file serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
